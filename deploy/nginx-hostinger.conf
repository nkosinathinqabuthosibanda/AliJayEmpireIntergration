# Nginx site config for Hostinger VPS
# Replace YOUR_DOMAIN with e.g. hub.alijayempire.co.za
# Install: sudo cp deploy/nginx-hostinger.conf /etc/nginx/sites-available/alijay-hub
#          sudo ln -s /etc/nginx/sites-available/alijay-hub /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# SSL:     sudo certbot --nginx -d YOUR_DOMAIN

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
